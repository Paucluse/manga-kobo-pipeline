# manga-kobo-pipeline 配置文件
# 复制为 config.yaml 并根据环境修改

# 数据目录路径（Docker 环境下通常挂载到 /data）
paths:
  inbox: /data/inbox
  processing: /data/processing
  archive_cbz: /data/archive_cbz
  kepub_ready: /data/kepub_ready
  state: /data/state
  manual_review: /data/manual-review
  logs: /data/logs

# Kobo 设备和 KCC 转换参数
kobo:
  profile: KoS            # KCC profile: KoS = Kobo Sage
  format: KEPUB            # 输出格式（KEPUB 比 EPUB 在 Kobo 上效果更好）
  manga_style: true        # 日漫模式（右→左）
  high_quality: true       # 高质量转换

# PDF 转图片参数
pdf:
  enabled: true             # 允许 .pdf 输入
  strategy: extract_first   # 优先直接抽取 PDF 内嵌图片，避免整页重渲染
  render_fallback: false    # 抽取失败时不自动回退到慢速渲染
  preserve_original: true   # 归档原 PDF，避免 inbox 清理后丢原文件
  dpi: 180                  # strategy=render 或启用 fallback 时使用
  image_format: jpg         # strategy=render 时使用：jpg 或 png
  jpeg_quality: 92          # strategy=render 且 image_format=jpg 时生效

# 元数据默认值
metadata:
  default_language: zho    # 中文（中文翻译版日漫）
  confidence_auto_accept: 0.4  # 低于此阈值进入人工确认
  bookwalker_tw_enabled: true   # 使用 BookWalker 台湾作为元数据来源
  bookwalker_tw_min_confidence: 0.65
  bookwalker_tw_max_candidates: 8
  bookwalker_jp_enabled: true   # BookWalker 台湾无可接受匹配时，尝试日本站
  bookwalker_jp_min_confidence: 0.65
  bookwalker_jp_max_candidates: 8
  bangumi_enabled: true         # BookWalker 台湾/日本都无可接受匹配时，用 Bangumi 兜底
  bangumi_min_confidence: 0.65
  bangumi_max_candidates: 30
  download_bookwalker_covers: true
  llm_normalize_enabled: false  # 可选：用 LLM 从文件名补齐标题/作者/出版社
  llm_base_url: https://generativelanguage.googleapis.com/v1beta/openai
  llm_model: gemini-3.1-flash-lite
  llm_api_key_file: /run/secrets/gemini_api_key
  llm_api_key_env: GEMINI_API_KEY
  llm_timeout_seconds: 30
  default_tags:
    - manga
    - chinese-translation
    - kobo-sync

# 外部命令路径
commands:
  kcc: kcc-c2e             # KCC 命令行工具
  pdfimages: pdfimages     # poppler-utils 提供的 PDF 图片抽取工具
  pdftoppm: pdftoppm       # poppler-utils 提供的 PDF 渲染工具

# Komga 扫描触发配置
komga:
  base_uri: http://komga:25600
  user: admin@manga.local
  password: changeme
  library_id: ""            # 留空时自动选择第一个 Komga 库

# 处理参数
processing:
  stable_check_seconds: 30   # 文件稳定检查总时长（秒）
  stable_check_interval: 5   # 检查间隔（秒）
  delete_inbox_after_archive: true  # 归档成功后删除 inbox 原文件
  cleanup_after_import: true        # 导入 Komga 后清理转换临时文件
  max_retries: 3             # 最大重试次数

# 日志
logging:
  level: INFO                # DEBUG / INFO / WARNING / ERROR
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
